name: Version Guard

on:
    pull_request:
        paths:
            - "gotools.sh"

jobs:
    check-version:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Verify Version Increment
              run: |
                  # 1. Extract versions
                  NEW_VERSION=$(grep '^VERSION=' gotools.sh | cut -d'"' -f2)
                  OLD_VERSION=$(git show origin/${{ github.base_ref }}:gotools.sh | grep '^VERSION=' | cut -d'"' -f2)

                  echo "Old version: $OLD_VERSION"
                  echo "New version: $NEW_VERSION"

                  # 2. Check if they are identical
                  if [ "$NEW_VERSION" == "$OLD_VERSION" ]; then
                    echo "❌ ERROR: gotools.sh was modified, but the VERSION ($NEW_VERSION) was not incremented."
                    exit 1
                  fi

                  # 3. Use 'sort -V' to determine if NEW_VERSION is actually the higher one
                  # sort -V puts the smallest version first.
                  # If the first line of the sorted list is NOT the OLD_VERSION, it means the NEW_VERSION is smaller.
                  HIGHEST=$(printf "%s\n%s" "$OLD_VERSION" "$NEW_VERSION" | sort -V | tail -n 1)

                  if [ "$HIGHEST" != "$NEW_VERSION" ]; then
                    echo "❌ ERROR: Version downgrade detected! $NEW_VERSION is lower than $OLD_VERSION."
                    exit 1
                  fi

                  echo "✅ Version successfully incremented to $NEW_VERSION"
